<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <title>Live Comments</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#090a1a">
  
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <link rel="apple-touch-icon" href="icon-192.png">
  <link rel="apple-touch-icon" sizes="152x152" href="icon-152.png">
  <link rel="apple-touch-icon" sizes="180x180" href="icon-192.png">

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@300;400;500;600&family=Noto+Sans+Thai:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>

<body>

   <!-- 🔴 ปิดเว็บชั่วคราว -->
  <script>
    window.location.href = "closed.html";
  </script>

  

  <!-- Background -->
  <div class="bg-orb orb-1"></div>
  <div class="bg-orb orb-2"></div>
  <div class="bg-orb orb-3"></div>

  <!-- Header -->
  <header class="glass-header">
    <div class="header-inner">

      <!-- 🔥 เปลี่ยนเป็น button -->
      <div class="live-badge">
        <span class="live-dot"></span>
        <button id="clear-btn" style="background:none;border:none;color:white;cursor:pointer;font-weight:700;">
          LIVE
        </button>
      </div>

      <div class="header-title">
        <h1>ความคิดเห็น</h1>
      </div>

      <div class="viewer-count">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
          <circle cx="9" cy="7" r="4"/>
          <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
          <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
        </svg>
        <span id="viewer-count">0</span>
      </div>

    </div>
  </header>

  <!-- Feed -->
  <main class="comment-feed" id="comment-feed" role="log" aria-live="polite">
    <div class="feed-spacer-top"></div>
    <div class="feed-spacer-bottom"></div>
  </main>

  <!-- Input -->
  <footer class="glass-footer">
    <div class="input-row">
      <div class="avatar-self">
        <span id="self-initial">A</span>
      </div>

      <div class="input-wrapper glass-input">
        <input
          type="text"
          id="comment-input"
          placeholder="แสดงความคิดเห็น…"
          maxlength="200"
          autocomplete="off"
          autocorrect="off"
          spellcheck="false"
        />
      </div>

      <button class="send-btn" id="send-btn">➤</button>
    </div>

    <div class="char-count" id="char-count">200</div>
  </footer>

  <!-- Modal -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal glass-card">
      <div class="modal-icon">💬</div>
      <h2 class="modal-title">ยินดีต้อนรับ</h2>
      <p class="modal-subtitle">ใส่ชื่อของคุณเพื่อเข้าร่วม</p>

      <input
        type="text"
        id="name-input"
        class="glass-input name-field"
        placeholder="ชื่อของคุณ"
        maxlength="20"
      />

      <button class="join-btn" id="join-btn">เข้าร่วม Live</button>
    </div>
  </div>

  <!-- Firebase -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

    import { 
      getFirestore, 
      collection, 
      addDoc, 
      onSnapshot, 
      query, 
      orderBy,
      doc,
      setDoc,
      deleteDoc,
      getDocs
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAkM-kBPSeuABLv_UeZnz2YLrn0pqbJw4M",
      authDomain: "live-comments-60609.firebaseapp.com",
      projectId: "live-comments-60609",
      storageBucket: "live-comments-60609.firebasestorage.app",
      messagingSenderId: "104358541443",
      appId: "1:104358541443:web:f49a3fb3a23bb3dbaf03b6"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    window.db = db;
    window.fb = { 
      collection, 
      addDoc, 
      onSnapshot, 
      query, 
      orderBy, 
      getDocs, 
      deleteDoc,
      doc,
      setDoc
    };
  </script>

  <!--  IMPORTANT -->
  <script type="module" src="app.js"></script>

</body>
</html>
