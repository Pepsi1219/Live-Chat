<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Live Comments</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@300;400;500;600&family=Noto+Sans+Thai:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Background orbs -->
  <div class="bg-orb orb-1"></div>
  <div class="bg-orb orb-2"></div>
  <div class="bg-orb orb-3"></div>

  <!-- Header -->
  <header class="glass-header">
    <div class="header-inner">
      <div class="live-badge">
        <span class="live-dot"></span>
        <span>LIVE</span>
      </div>
      <div class="header-title">
        <h1>ความคิดเห็น</h1>
      </div>
      <div class="viewer-count">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
          <circle cx="9" cy="7" r="4"/>
          <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
          <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
        </svg>
        <span id="viewer-count">0</span>
      </div>
    </div>
  </header>

  <!-- Comment Feed -->
  <main class="comment-feed" id="comment-feed" role="log" aria-live="polite" aria-label="Live comments">
    <div class="feed-spacer-top"></div>

    <!-- Comments injected here by JS -->

    <div class="feed-spacer-bottom"></div>
  </main>

  <!-- Input Area -->
  <footer class="glass-footer">
    <div class="input-row">
      <div class="avatar-self">
        <span id="self-initial">A</span>
      </div>
      <div class="input-wrapper glass-input">
        <input
          type="text"
          id="comment-input"
          placeholder="แสดงความคิดเห็น…"
          maxlength="200"
          autocomplete="off"
          autocorrect="off"
          spellcheck="false"
        />
      </div>
      <button class="send-btn" id="send-btn" aria-label="ส่งความคิดเห็น">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"/>
          <polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>
    <div class="char-count" id="char-count">200</div>
  </footer>

  <!-- Name Setup Modal -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal glass-card">
      <div class="modal-icon">💬</div>
      <h2 class="modal-title">ยินดีต้อนรับ</h2>
      <p class="modal-subtitle">ใส่ชื่อของคุณเพื่อเข้าร่วม</p>
      <input
        type="text"
        id="name-input"
        class="glass-input name-field"
        placeholder="ชื่อของคุณ"
        maxlength="20"
      />
      <button class="join-btn" id="join-btn">เข้าร่วม Live</button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
